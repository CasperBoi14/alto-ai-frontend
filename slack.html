<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-title">Integrations</div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">Home</a>
            <a href="github.html" class="nav-item">GitHub</a>
            <a href="asana.html" class="nav-item">Asana</a>
            <a href="slack.html" class="nav-item active">Slack</a>
            <a href="gitlab.html" class="nav-item">GitLab</a>
            <a href="linear.html" class="nav-item">Linear</a>
            <a href="trello.html" class="nav-item">Trello</a>
            <a href="notion.html" class="nav-item">Notion</a>
            <a href="discord.html" class="nav-item">Discord</a>
            <a href="design-system.html" class="nav-item">Design System</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="header">
    <div class="header-badge badge-success">Active</div>
    <h1>Slack</h1>
    <p>Stuur berichten, reageer op mentions en beheer kanalen met Alto.</p>
  </header>
  <div class="container">
    <div class="mb-6 flex justify-between items-center" style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
        <a href="index" class="btn btn-outline">&larr; Back to Tools</a>
        <button id="saveButton" class="btn btn-primary" onclick="alert('Settings saved!')">Save Changes</button>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Slack Settings</h2>
            <p class="card-description">Configure the Slack integration settings.</p>
        </div>
        <div class="card-content">
            <div class="form-group">
                <label class="label">Allowed Workspaces (ID: slack.allowed_workspaces)</label>
                <textarea class="textarea" rows="3" placeholder="Enter workspace IDs or names, one per line"></textarea>
            </div>
            
             <div class="form-group">
                <label class="label">Allowed Channels (ID: slack.allowed_channels)</label>
                <textarea class="textarea" rows="3" placeholder="Enter channel IDs or names, one per line"></textarea>
            </div>

            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                <div>
                     <span class="label" style="margin-bottom: 0;">Allow Direct Messages (ID: slack.allow_dm)</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="switch-slider"></span>
                </label>
            </div>
        </div>
    </div>
  </div>
    </div>
</body>
</html>
