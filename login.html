<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alto AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #09090b;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
        }
        .login-title {
            font-family: 'Funnel Display', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fafafa;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
        .input {
            width: 100%;
            padding: 0.5rem;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #fafafa;
            border-radius: 0.25rem;
        }
        .input:focus {
            outline: none;
            border-color: #fafafa;
        }
        .btn-full {
            width: 100%;
            margin-top: 1rem;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Inloggen bij Alto</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username" class="label">Gebruikersnaam</label>
                <input type="text" id="username" class="input" required>
            </div>
            <div class="form-group">
                <label for="password" class="label">Wachtwoord</label>
                <input type="password" id="password" class="input" required>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <button type="submit" class="btn btn-primary btn-full" id="loginButton">Inloggen</button>
        </form>
    </div>
    <script type="module" src="js/login.js"></script>
</body>
</html>
