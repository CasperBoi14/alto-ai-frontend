<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-title">Integrations</div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">Home</a>
            <a href="github.html" class="nav-item">GitHub</a>
            <a href="asana.html" class="nav-item">Asana</a>
            <a href="slack.html" class="nav-item">Slack</a>
            <a href="gitlab.html" class="nav-item">GitLab</a>
            <a href="linear.html" class="nav-item active">Linear</a>
            <a href="trello.html" class="nav-item">Trello</a>
            <a href="notion.html" class="nav-item">Notion</a>
            <a href="discord.html" class="nav-item">Discord</a>
            <a href="design-system.html" class="nav-item">Design System</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="header">
    <div class="header-badge badge-success">Active</div>
    <h1>Linear</h1>
    <p>Bekijk, maak en beheer issues en teams met Alto.</p>
  </header>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Linear Instellingen</h2>
        <p class="card-description">Configureer welke teams en prioriteiten toegankelijk zijn.</p>
      </div>
      <div class="card-content">
        <div class="form-group">
          <label class="label">Toegestane teams</label>
          <div class="list-editor" id="linear-teams">
            <div class="list-editor-item">
              <input class="input" type="text" value="Voorbeeld Team" placeholder="Team naam">
              <button type="button" class="btn btn-outline btn-icon-only" onclick="this.parentElement.remove()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" class="icon"><path d="M7.5 9.5V14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 9.5V14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12.5 9.5V14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3.5 5.5H16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5.5 5.5V16.5C5.5 17.0523 5.94772 17.5 6.5 17.5H13.5C14.0523 17.5 14.5 17.0523 14.5 16.5V5.5" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 3.5H11.5C12.0523 3.5 12.5 3.94772 12.5 4.5V5.5H7.5V4.5C7.5 3.94772 7.94772 3.5 8.5 3.5Z" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
          <button type="button" class="btn btn-outline btn-sm mt-2" onclick="addLinearTeam()">+ Team toevoegen</button>
        </div>
        <script>
        function addLinearTeam() {
          const container = document.getElementById('linear-teams');
          const row = document.createElement('div');
          row.className = 'list-editor-item';
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'input';
          input.placeholder = 'Team naam';
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'btn btn-outline btn-icon-only';
          removeBtn.innerHTML = `<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\" class=\"icon\"><path d=\"M7.5 9.5V14.5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><path d=\"M10 9.5V14.5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><path d=\"M12.5 9.5V14.5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><path d=\"M3.5 5.5H16.5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><path d=\"M5.5 5.5V16.5C5.5 17.0523 5.94772 17.5 6.5 17.5H13.5C14.0523 17.5 14.5 17.0523 14.5 16.5V5.5\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M8.5 3.5H11.5C12.0523 3.5 12.5 3.94772 12.5 4.5V5.5H7.5V4.5C7.5 3.94772 7.94772 3.5 8.5 3.5Z\" stroke=\"currentColor\" stroke-width=\"1.5\"/></svg>`;
          removeBtn.onclick = () => row.remove();
          row.appendChild(input);
          row.appendChild(removeBtn);
          container.appendChild(row);
        }
        </script>
      </div>
    </div>
  </div>
    </div>
</body>
</html>
